name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tutorio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tutorio_test?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-ci-access-secret-000000
      JWT_REFRESH_SECRET: ci-refresh-secret-ci-refresh-secret-111

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @tutorio/api prisma:generate

      - name: Apply database migrations
        run: pnpm --filter @tutorio/api prisma:deploy

      - name: Lint, typecheck, test, build
        run: pnpm turbo run lint typecheck test build

      - name: API e2e tests
        run: pnpm --filter @tutorio/api test:e2e
